<!DOCTYPE html>
<html data-bs-theme="light" lang="fa">

<head>
    <meta charset="UTF-8">

        content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <link rel="stylesheet" href="style.css">

<body>
    <input type="text" id="dateInput" data-dpr="1" readonly placeholder="کلیک کنید" />
    <input type="text" id="1111" data-dpr="1" value="1367/7/22" />
    <input type="date" id="" />


    <script src="converter.js"></script>
    <script src="date.js"></script>
    <script>
        //startWatch('data-dpr');


        /* ********************************************* EVENT LISTENERS ****************************************** */
        // input.addEventListener("click", () => {
        //     datepicker.style.display = "block";
        // });

        const jdpInputs = document.querySelectorAll(`input[data-dpr='1']`);
        if (jdpInputs.length > 0) {
            jdpInputs.forEach((input) => {
                input.addEventListener('click', (e) => {
                    input.setAttribute("readonly","true");
                    //renderCalendar(currentDate);
                    startWatch(input);
                    //datepicker.style.display = "block";

                });
            });
        }
    </script>
</body>
